spring:
  # 1. Banco de dados PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/usuario
    username: postgres
    password: senha123
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  pgadmin:
    image: dpage/pgadmin4
    container_name: meu-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  main:
    allow-bean-definition-overriding: true
    web-application-type: servlet
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak-service:8093/realms/master
          jwk-set-uri: http://keycloak-service:8093/realms/master/protocol/openid-connect/certs